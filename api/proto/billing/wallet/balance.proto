syntax = "proto3";

package wallet;

// Path to generated code
option go_package = "github.com/SternKater/carsharing/pkg/billing/wallet/balance;wallet";

message BalanceRequest {
}

message BalanceResponse {
  bool success      = 1;
  int64 amount      = 2;
  string message    = 3;
}

service BalanceService {
    rpc Balance (BalanceRequest) returns (BalanceResponse);
}
