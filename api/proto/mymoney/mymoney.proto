syntax = "proto3";

package mymoney;

// Path to generated code
option go_package = "github.com/SternKater/carsharing/pkg/mymoney;mymoney";

message PaymentLinkRequest {
  int64 invoice_id       = 1;
  int64 amount_in_cents  = 2;
  string callback_url    = 3; 
}

message PaymentLinkResponse {
  string payment_url     = 1; 
  string payment_id      = 2; 
}

message WebhookNotify {
  int64 invoice_id       = 1;
  int64 amount_in_cents  = 2;
  string payment_id      = 3;
  string status          = 4; // "success" / "failed"
}

message WebhookResponse {
  bool received          = 1;
}

// mymoney responsibility
service MyMoneyService {
  rpc GetPaymentLink (PaymentLinkRequest) returns (PaymentLinkResponse);
}

// carsharing responsibility
service MyMoneyCallbackService {
  rpc OnPaymentComplete (WebhookNotify) returns (WebhookResponse);
}
