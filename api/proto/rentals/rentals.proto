syntax = "proto3";

package rentals;

// Path to generated code
option go_package = "github.com/SternKater/carsharing/pkg/rentals;rentals";

message StartRequest {
  int64 user_id = 1;
  int64 car_id  = 2;
}

message StartResponse {
  bool success  = 1;
  string message= 2;
}

message FinishRequest {
  int64 user_id = 1;
  int64 car_id  = 2;
}

message FinishResponse {
  bool success  = 1;
  string message= 2;
}

message CancelRequest {
  int64 user_id = 1;
  int64 car_id  = 2;
}

message CancelResponse {
  bool success  = 1;
  string message= 2;
}

service RentalsService {
  rpc Start (StartRequest) returns (StartResponse);
  rpc Finish (FinishRequest) returns (FinishResponse);
  rpc Cancel (CancelRequest) returns (CancelResponse);
}
