version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: carsharing_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carsharing_db # DB name
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d carsharing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carsharing_redis
    ports:
      - "6380:6379"

volumes:
  pgdata: